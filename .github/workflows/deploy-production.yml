name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_ENV: production

permissions:
  actions: read
  contents: read

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tests passing
        uses: actions/github-script@v7
        with:
          script: |
            // Skip this run to avoid race condition
            const currentRunId = context.runId;
            
            async function waitForCI(maxAttempts = 30, delay = 10000) {
              for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const { data: runs } = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'ci.yml',
                  branch: 'main',
                  per_page: 5
                });
                
                // Find the latest CI run for this commit (excluding running ones)
                const currentRun = runs.workflow_runs.find(r => r.id === currentRunId);
                const ciRuns = runs.workflow_runs.filter(r => 
                  r.id !== currentRunId && 
                  r.head_sha === currentRun?.head_sha || context.sha
                );
                
                const latestCI = ciRuns[0];
                
                if (!latestCI) {
                  console.log(`Attempt ${attempt + 1}: No CI run found yet, waiting...`);
                  await new Promise(resolve => setTimeout(resolve, delay));
                  continue;
                }
                
                console.log(`Attempt ${attempt + 1}: CI run status = ${latestCI.status}, conclusion = ${latestCI.conclusion}`);
                
                if (latestCI.status === 'completed') {
                  if (latestCI.conclusion === 'success') {
                    console.log('CI passed! Proceeding with deploy.');
                    return;
                  } else {
                    core.setFailed(`Latest CI run was not successful: ${latestCI.conclusion}`);
                    return;
                  }
                }
                
                await new Promise(resolve => setTimeout(resolve, delay));
              }
              
              core.setFailed('Timeout waiting for CI to complete');
            }
            
            await waitForCI();

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ vars.PRODUCTION_URL }}

      - name: Deploy to Vercel
        uses: vercel/action-deploy-zero@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1
        if: success()
        with:
          payload: |
            {
              "text": "🚀 Food Service deployed to production!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Food Service* deployed successfully to production!\n*Commit:* ${{ github.sha }}\n*URL:* ${{ vars.PRODUCTION_URL }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}