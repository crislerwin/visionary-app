name: CI/CD Notifications

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to n8n
        run: |
          curl -X POST "https://n8n.reactivesoftware.com.br/webhook/github-ci-webhook-001" \
            -H "Content-Type: application/json" \
            -H "x-github-event: workflow_run" \
            -d "{
              \"action\": \"completed\",
              \"repository\": {
                \"full_name\": \"${{ github.repository }}\",
                \"html_url\": \"${{ github.event.repository.html_url }}\"
              },
              \"workflow_run\": {
                \"id\": ${{ github.event.workflow_run.id }},
                \"name\": \"${{ github.event.workflow_run.name }}\",
                \"head_branch\": \"${{ github.event.workflow_run.head_branch }}\",
                \"head_commit\": {
                  \"message\": \"${{ github.event.workflow_run.head_commit.message }}\"
                },
                \"actor\": {
                  \"login\": \"${{ github.actor }}\",
                  \"html_url\": \"https://github.com/${{ github.actor }}\"
                },
                \"conclusion\": \"${{ github.event.workflow_run.conclusion }}\",
                \"html_url\": \"${{ github.event.workflow_run.html_url }}\",
                \"run_started_at\": \"${{ github.event.workflow_run.run_started_at }}\",
                \"updated_at\": \"${{ github.event.workflow_run.updated_at }}\"
              }
            }"
