name: CI/CD Notifications

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != '' }}
    steps:
      - name: Send notification to n8n
        env:
          WEBHOOK_URL: "https://n8n.reactivesoftware.com.br/webhook/github-ci-webhook-001"
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO_FULL_NAME: ${{ github.event.workflow_run.head_repository.full_name }}
          REPO_HTML_URL: ${{ github.event.workflow_run.head_repository.html_url }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
          RUN_HTML_URL: ${{ github.event.workflow_run.html_url }}
          ACTOR_LOGIN: ${{ github.event.workflow_run.head_repository.owner.login }}
        run: |
          # Build commit message (limit to first line, escape quotes)
          COMMIT_MSG='${{ toJSON(github.event.workflow_run.head_commit.message) }}'
          # Take first line only and remove surrounding quotes from toJSON
          COMMIT_MSG=$(echo "$COMMIT_MSG" | head -1 | sed 's/^"//;s/"$//')

          # Set color based on conclusion
          if [ "$CONCLUSION" = "success" ]; then
            COLOR="#00c853"
            STATUS_EMOJI=":white_check_mark:"
          elif [ "$CONCLUSION" = "failure" ]; then
            COLOR="#ff1744" 
            STATUS_EMOJI=":x:"
          else
            COLOR="#808080"
            STATUS_EMOJI=":warning:"
          fi

          # Build payload with proper escaping
          cat > /tmp/payload.json << EOF
          {
            "text": "${STATUS_EMOJI} CI/CD **${CONCLUSION}**",
            "props": {
              "card": {
                "color": "${COLOR}",
                "title": "${STATUS_EMOJI} CI/CD: ${RUN_NAME}",
                "title_link": "${RUN_HTML_URL}",
                "fields": [
                  {"title": "Repository", "value": "${REPO_FULL_NAME}", "short": true},
                  {"title": "Branch", "value": "${HEAD_BRANCH}", "short": true},
                  {"title": "Commit", "value": "${COMMIT_MSG}", "short": false},
                  {"title": "Actor", "value": "${ACTOR_LOGIN}", "short": true},
                  {"title": "Status", "value": "${STATUS_EMOJI} ${CONCLUSION}", "short": true}
                ],
                "footer": "GitHub Actions"
              }
            }
          }
          EOF

          echo "--- Payload ---"
          cat /tmp/payload.json
          echo "---------------"

          # Send webhook
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-github-event: workflow_run" \
            -d @/tmp/payload.json || echo "000")

          echo "HTTP response code: $HTTP_CODE"
          cat /tmp/response.txt || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: Webhook returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Notification sent successfully!"
