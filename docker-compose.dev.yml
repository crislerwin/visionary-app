# Docker Compose para DESENVOLVIMENTO local com hot-reload
# Uso: docker compose -f docker-compose.dev.yml up -d
# Ou: task dev:up

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-saas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - food-service-net

  app:
    image: node:22-alpine
    container_name: food-service-app-dev
    working_dir: /app
    # Volume do código fonte + volume anônimo para node_modules
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - bun_cache:/root/.bun
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-saas}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-lgtm:4318/v1/traces}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-food-service}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://192.168.3.55:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://192.168.3.55:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-food-service-images}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    # Instala bun e dependências, depois roda dev server
    command: >
      sh -c "
        npm install -g bun &&
        bun install --frozen-lockfile &&
        bunx prisma generate &&
        bun run dev
      "
    stdin_open: true
    tty: true
    networks:
      - food-service-net

volumes:
  postgres_data:
  node_modules:
  bun_cache:

networks:
  food-service-net:
    driver: bridge
